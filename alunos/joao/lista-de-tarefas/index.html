<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Lista de tarefas</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <main>
            <section>
                <article class="tarefa">
                    <header>
                        <div>
                            <span class="trabalho">Trabalho</span>
                            <span class="urgente">Urgente</span>
                        </div>

                        <button class="excluir">
                            <img src="images/trash.svg" />
                        </button>
                    </header>
                    
                    <div class="corpo">
                        <h2>Anotações da reunião</h2>
                        <p>
                            Lorem, ipsum dolor sit amet consectetur adipisicing
                            elit. Repellendus similique adipisci ad autem quis,
                            numquam, sint quod cum esse delectus.
                        </p>
                    </div>
                    <hr>
                    <footer>
                        <div class="usuarios">
                            <div class="bolinha"></div>
                            <div class="bolinha2"></div>
                        </div>
                        <span class="publicacao">Criado 2h atrás</span>
                    </footer>
                </article>
            </section>
        </main>
    </body>
</html>
